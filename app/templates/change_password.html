{% extends "base.html" %}
{% block title %}Cambia password — MCP Hub{% endblock %}
{% block content %}
<h1>Cambia password</h1>
<div class="card" style="max-width:440px;">
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if ok %}
    <div style="background:rgba(61,220,151,.12); border:1px solid var(--ok); color:#9fe9c8; padding:10px 12px; border-radius:8px; margin-bottom:14px; font-size:14px;">
      Password aggiornata correttamente.
    </div>
  {% endif %}
  <form method="post" action="/account/password">
    <label>Password attuale</label>
    <input type="password" name="current" autocomplete="current-password" required>
    <label>Nuova password (min 8 caratteri)</label>
    <input type="password" name="new" autocomplete="new-password" required>
    <label>Conferma nuova password</label>
    <input type="password" name="confirm" autocomplete="new-password" required>
    <div style="margin-top:18px; display:flex; gap:10px;">
      <button class="btn" type="submit">Aggiorna password</button>
      <a class="btn secondary" href="/">Indietro</a>
    </div>
  </form>
</div>
<p class="muted">Utente: <strong>{{ user }}</strong></p>
{% endblock %}
